apis:
  # ============================================================
  # 기본 CRUD
  # ============================================================

  # 전체 사용자 목록
  - entrypoint: /api/users
    method: GET
    description: 사용자 목록 조회 (페이징)
    script: |
      var page = parseInt(req.query.page) || 1;
      var limit = parseInt(req.query.limit) || 10;
      var users = [];
      for (var i = 0; i < limit; i++) {
        var id = (page - 1) * limit + i + 1;
        users.push({ id: id, name: "User " + id, email: "user" + id + "@example.com" });
      }
      res.setHeader("X-Total-Count", "100");
      res.setHeader("X-Page", String(page));
      res.json(200, { users: users, page: page, limit: limit, total: 100 });

  # 사용자 상세 조회
  - entrypoint: /api/users/{id}
    method: GET
    description: 사용자 상세 조회
    script: |
      var id = req.params.id;
      if (id === "0" || id === "999") {
        res.json(404, { error: "사용자를 찾을 수 없습니다", id: id });
      } else {
        res.json(200, {
          id: parseInt(id),
          name: "User " + id,
          email: "user" + id + "@example.com",
          createdAt: "2026-01-15T09:00:00Z"
        });
      }

  # 사용자 생성 (Request Body 검증)
  - entrypoint: /api/users
    method: POST
    description: 사용자 생성
    validation:
      schema:
        type: object
        required: [name, email]
        properties:
          name:
            type: string
            minLength: 2
          email:
            type: string
            format: email
          age:
            type: integer
            minimum: 0
          tags:
            type: array
            items:
              type: string
    script: |
      var user = {
        id: Math.floor(Math.random() * 10000),
        name: req.body.name,
        email: req.body.email,
        age: req.body.age || null,
        tags: req.body.tags || [],
        createdAt: new Date().toISOString()
      };
      res.setHeader("Location", "/api/users/" + user.id);
      res.json(201, user);

  # 사용자 수정
  - entrypoint: /api/users/{id}
    method: PUT
    description: 사용자 정보 수정
    script: |
      var id = req.params.id;
      if (id === "0") {
        res.json(404, { error: "사용자를 찾을 수 없습니다" });
      } else {
        var updated = req.body;
        updated.id = parseInt(id);
        updated.updatedAt = new Date().toISOString();
        res.json(200, updated);
      }

  # 사용자 삭제
  - entrypoint: /api/users/{id}
    method: DELETE
    description: 사용자 삭제
    script: |
      var id = req.params.id;
      if (id === "0") {
        res.json(404, { error: "사용자를 찾을 수 없습니다" });
      } else {
        res.json(200, { message: "삭제 완료", id: parseInt(id) });
      }

  # ============================================================
  # 검색 / 필터링
  # ============================================================

  # 검색 API (다중 쿼리 파라미터)
  - entrypoint: /api/search
    method: GET
    description: 통합 검색 (q, category, sort, order)
    script: |
      var q = req.query.q || "";
      var category = req.query.category || "all";
      var sort = req.query.sort || "relevance";
      var order = req.query.order || "desc";

      if (!q) {
        res.json(400, { error: "검색어(q)는 필수입니다" });
      } else {
        var results = [];
        for (var i = 1; i <= 5; i++) {
          results.push({
            id: i,
            title: q + " 검색 결과 " + i,
            category: category,
            score: (100 - i * 10)
          });
        }
        res.json(200, {
          query: q,
          category: category,
          sort: sort,
          order: order,
          count: results.length,
          results: results
        });
      }

  # ============================================================
  # 인증 관련 (auth: false → 토큰 불필요)
  # ============================================================

  # 공개 API (인증 불필요)
  - entrypoint: /api/public/info
    method: GET
    description: 서버 정보 (인증 불필요)
    auth: false
    script: |
      res.json(200, {
        name: "dummy-web-server",
        version: "1.0.0",
        timestamp: new Date().toISOString()
      });

  # ============================================================
  # 커스텀 헤더 / 상태 코드
  # ============================================================

  # 다양한 HTTP 상태 코드 반환
  - entrypoint: /api/status/{code}
    method: GET
    description: 지정한 HTTP 상태 코드를 반환
    auth: false
    script: |
      var code = parseInt(req.params.code);
      var messages = {
        200: "OK",
        201: "Created",
        204: "No Content",
        400: "Bad Request",
        401: "Unauthorized",
        403: "Forbidden",
        404: "Not Found",
        500: "Internal Server Error",
        502: "Bad Gateway",
        503: "Service Unavailable"
      };
      var msg = messages[code] || "Unknown Status";
      res.json(code, { status: code, message: msg });

  # 커스텀 헤더 테스트
  - entrypoint: /api/headers
    method: GET
    description: 요청 헤더를 응답에 반영
    script: |
      res.setHeader("X-Request-Id", "req-" + Math.floor(Math.random() * 100000));
      res.setHeader("X-Custom-Header", "hello-from-mock");
      res.setHeader("Cache-Control", "no-cache");
      res.json(200, {
        receivedHeaders: req.headers,
        note: "요청 시 보낸 헤더가 그대로 반환됩니다"
      });

  # ============================================================
  # 지연 응답 (Latency 시뮬레이션은 불가하지만 구조는 표현)
  # ============================================================

  # Echo API (요청 전체를 그대로 반환)
  - entrypoint: /api/echo
    method: POST
    description: 요청 바디/헤더/쿼리를 그대로 반환
    auth: false
    script: |
      res.json(200, {
        body: req.body,
        query: req.query,
        headers: req.headers
      });

  # ============================================================
  # 파일 업로드
  # ============================================================

  # 단일 파일 업로드
  - entrypoint: /api/files/upload
    method: POST
    description: 단일 파일 업로드
    script: |
      if (req.files.length === 0) {
        res.json(400, { error: "파일이 없습니다" });
      } else {
        var f = req.files[0];
        res.json(200, {
          message: "업로드 완료",
          file: {
            fieldName: f.fieldName,
            fileName: f.fileName,
            size: f.size,
            savedPath: f.savedPath
          }
        });
      }

  # 다중 파일 업로드
  - entrypoint: /api/files/upload-multi
    method: POST
    description: 다중 파일 업로드
    script: |
      if (req.files.length === 0) {
        res.json(400, { error: "파일이 없습니다" });
      } else {
        var files = [];
        for (var i = 0; i < req.files.length; i++) {
          var f = req.files[i];
          files.push({
            fieldName: f.fieldName,
            fileName: f.fileName,
            size: f.size,
            savedPath: f.savedPath
          });
        }
        res.json(200, {
          message: files.length + "개 파일 업로드 완료",
          count: files.length,
          files: files
        });
      }

  # 파일 업로드 + 폼 데이터 동시 처리
  - entrypoint: /api/files/upload-with-meta
    method: POST
    description: 파일 업로드와 폼 필드를 동시에 처리
    script: |
      if (req.files.length === 0) {
        res.json(400, { error: "파일이 없습니다" });
      } else {
        res.json(200, {
          message: "업로드 완료",
          formData: req.body,
          file: {
            fileName: req.files[0].fileName,
            size: req.files[0].size
          }
        });
      }

  # ============================================================
  # 파일 다운로드
  # ============================================================

  # 파일 다운로드
  - entrypoint: /api/files/download/{fileName}
    method: GET
    description: 파일 다운로드
    auth: false
    script: |
      var fileName = req.params.fileName;

      if (fileName.includes("..") || fileName.includes("/")) {
        res.json(400, { error: "잘못된 파일명입니다" });
      } else {
        res.file("./storage/" + fileName);
      }

  # ============================================================
  # multipart/mixed 응답 (JSON + 파일 + 텍스트 동시 반환)
  # ============================================================

  # 리포트 번들: 메타데이터(JSON) + 첨부 파일 + 설명(text)
  - entrypoint: /api/reports/{id}/bundle
    method: GET
    description: 리포트 메타데이터와 파일을 한 응답에 동시 반환
    auth: false
    script: |
      var id = req.params.id;
      res.multipart(200, [
        {
          name: "meta",
          json: {
            reportId: id,
            title: "Report " + id,
            tags: ["q1", "summary"],
            generatedAt: new Date().toISOString()
          }
        },
        {
          name: "note",
          text: "이 리포트는 Mock 서버가 생성한 샘플입니다."
        },
        {
          name: "attachment",
          file: "./storage/asset.fbx",
          filename: "report-" + id + ".fbx"
        }
      ]);

  # 업로드한 파일을 그대로 돌려주면서 분석 결과(JSON)도 함께 전달
  - entrypoint: /api/files/analyze
    method: POST
    description: 업로드 파일 + 분석 결과(JSON)를 multipart로 반환
    script: |
      if (req.files.length === 0) {
        res.json(400, { error: "파일이 없습니다" });
      } else {
        var f = req.files[0];
        res.multipart(200, [
          {
            name: "analysis",
            json: {
              fileName: f.fileName,
              size: f.size,
              checksum: "mock-" + f.size,
              status: "ok"
            }
          },
          {
            name: "original",
            file: f.savedPath,
            filename: f.fileName
          }
        ]);
      }

  # ============================================================
  # 중첩 리소스 (Nested Resources)
  # ============================================================

  # 사용자의 게시글 목록
  - entrypoint: /api/users/{userId}/posts
    method: GET
    description: 특정 사용자의 게시글 목록
    script: |
      var userId = req.params.userId;
      var posts = [];
      for (var i = 1; i <= 3; i++) {
        posts.push({
          id: i,
          userId: parseInt(userId),
          title: "User " + userId + "의 게시글 " + i,
          body: "게시글 내용입니다.",
          createdAt: "2026-01-" + (10 + i) + "T09:00:00Z"
        });
      }
      res.json(200, { userId: parseInt(userId), posts: posts });

  # 사용자의 게시글 상세
  - entrypoint: /api/users/{userId}/posts/{postId}
    method: GET
    description: 특정 사용자의 특정 게시글 조회
    script: |
      var userId = req.params.userId;
      var postId = req.params.postId;
      res.json(200, {
        id: parseInt(postId),
        userId: parseInt(userId),
        title: "User " + userId + "의 게시글 " + postId,
        body: "상세 내용입니다. 이 게시글은 User " + userId + "가 작성했습니다.",
        comments: [
          { id: 1, author: "commenter1", text: "좋은 글이네요!" },
          { id: 2, author: "commenter2", text: "감사합니다." }
        ],
        createdAt: "2026-01-15T09:00:00Z"
      });

  # ============================================================
  # 조건 분기 / 비즈니스 로직 시뮬레이션
  # ============================================================

  # 주문 생성 (재고 체크 시뮬레이션)
  - entrypoint: /api/orders
    method: POST
    description: 주문 생성 (재고 부족 시뮬레이션 포함)
    validation:
      schema:
        type: object
        required: [productId, quantity]
        properties:
          productId:
            type: string
          quantity:
            type: integer
            minimum: 1
    script: |
      var productId = req.body.productId;
      var quantity = req.body.quantity;

      // 재고 부족 시뮬레이션: quantity > 100이면 재고 부족
      if (quantity > 100) {
        res.json(409, {
          error: "재고 부족",
          productId: productId,
          requested: quantity,
          available: 100
        });
      } else {
        var orderId = "ORD-" + Math.floor(Math.random() * 100000);
        res.json(201, {
          orderId: orderId,
          productId: productId,
          quantity: quantity,
          totalPrice: quantity * 15000,
          status: "confirmed",
          createdAt: new Date().toISOString()
        });
      }

  # ============================================================
  # PATCH (부분 수정)
  # ============================================================

  # 사용자 부분 수정
  - entrypoint: /api/users/{id}
    method: PATCH
    description: 사용자 정보 부분 수정
    script: |
      var id = req.params.id;
      var fields = req.body;
      var updated = { id: parseInt(id) };
      var keys = Object.keys(fields);
      for (var i = 0; i < keys.length; i++) {
        updated[keys[i]] = fields[keys[i]];
      }
      updated.updatedAt = new Date().toISOString();
      res.json(200, { message: "부분 수정 완료", user: updated });
